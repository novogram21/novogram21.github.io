<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novogram - Visual Bot Builder</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>

    <style>
        /* ПРЕМИУМ ДИЗАЙН NOVOGRAM */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121316; color: #fff; margin: 0;
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
        }

        /* Шапка */
        .premium-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: calc(env(safe-area-inset-top) + 20px) 20px 15px;
            background: rgba(18, 19, 22, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100;
        }
        .header-title { font-weight: 600; font-size: 18px; color: white; }
        .header-icon-btn {
            background: none; border: none; padding: 8px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: #736AF0; transition: 0.2s;
        }

        /* Вьюхи */
        .view { display: none; height: 100%; flex-direction: column; }
        .view.active { display: flex; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }

        .btn-primary {
            background: #736AF0; color: white; border: none; padding: 15px;
            border-radius: 14px; font-weight: 600; font-size: 16px; width: 100%; cursor: pointer; transition: 0.2s;
        }

        /* ==========================================
           СТИЛИ ВИЗУАЛЬНОГО РЕДАКТОРА (DRAWFLOW)
           ========================================== */
        #drawflow {
            position: relative; width: 100%; height: 100%; background: #0a0c10;
            background-image: radial-gradient(#222 1px, transparent 0); background-size: 20px 20px;
        }

        .editor-top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 5;
        }

        .toolbar-btn {
            background: #1c1c1e; color: white; border: 1px solid #333; padding: 10px 15px;
            border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Переопределение стилей самой библиотеки под твой дизайн */
        .drawflow .drawflow-node {
            background: #1c1c1e; border: 1px solid #333; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; padding: 0;
            color: white; font-family: inherit;
        }
        .drawflow .drawflow-node.selected { border-color: #736AF0; box-shadow: 0 0 0 2px rgba(115,106,240,0.3); }

        .node-header {
            background: #252528; padding: 12px 15px; border-top-left-radius: 16px;
            border-top-right-radius: 16px; font-weight: bold; font-size: 14px;
            border-bottom: 1px solid #333; display: flex; justify-content: space-between;
        }
        .node-content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .node-input {
            background: #121316; border: 1px solid #333; color: white;
            padding: 10px; border-radius: 8px; width: 100%; font-family: inherit; resize: vertical; outline: none;
        }
        .node-input:focus { border-color: #736AF0; }

        /* Точки соединения */
        .drawflow .inputs .input { left: -10px; background: #fff; border: 2px solid #736AF0; width: 16px; height: 16px; }
        .drawflow .outputs .output { right: -10px; background: #fff; border: 2px solid #10b981; width: 16px; height: 16px; }
        
        /* Линии */
        .drawflow .connection .main-path { stroke: #736AF0; stroke-width: 3px; }

        /* Кнопки внутри блока */
        .node-buttons-container { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .node-btn-item {
            background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px;
            display: flex; align-items: center; border: 1px solid #333; position: relative;
        }
        .node-btn-input { background: transparent; border: none; color: #4a9eff; width: 100%; outline: none; font-weight: bold; text-align: center; }
        
        /* Загрузчик */
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#121316; display:flex; align-items:center; justify-content:center; z-index:9999; }

        /* ==========================================
           КОНТЕКСТНОЕ МЕНЮ (ПО ПРАВОМУ КЛИКУ)
           ========================================== */
        #nodeContextMenu {
            position: absolute;
            background: #1c1c1e;
            border: 1px solid #333;
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
            z-index: 10000;
            width: 220px;
            display: none;
            flex-direction: column;
            padding: 6px 0;
            user-select: none;
        }

        .context-menu-item {
            padding: 10px 16px;
            color: #ccc;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.1s, color 0.1s;
        }

            .context-menu-item:hover {
                background: #2a2a2d;
                color: #fff;
            }

            .context-menu-item .icon {
                font-size: 16px;
                width: 20px;
                text-align: center;
            }

        .icon-msg {
            color: #4a9eff;
        }

        .icon-action {
            color: #f59e0b;
        }

        .icon-cond {
            color: #10b981;
        }

        .icon-timer {
            color: #ec4899;
        }

        .icon-start {
            color: #84cc16;
        }

        .icon-rand {
            color: #8b5cf6;
        }

        .icon-key {
            color: #0ea5e9;
        }

        .icon-event {
            color: #06b6d4;
        }

        .icon-note {
            color: #8e8e93;
        }

        .context-menu-divider {
            height: 1px;
            background: #333;
            margin: 6px 16px;
        }

        .context-menu-cancel {
            padding: 10px 16px;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
        }

            .context-menu-cancel:hover {
                color: #fff;
                background: #2a2a2d;
            }

        /* ==========================================
           ОБНОВЛЕННЫЙ ДИЗАЙН БЛОКОВ (ROBOCHAT STYLE)
           ========================================== */
        .drawflow .drawflow-node {
            background: #ffffff; /* Белые карточки как в Robochat */
            border: none;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            width: 280px;
            color: #333;
            padding: 0;
            overflow: hidden;
        }

        /* Темная тема для темного режима */
        @media (prefers-color-scheme: dark) {
            .drawflow .drawflow-node {
                background: #1c1c1e;
                border: 1px solid #333;
                color: #fff;
            }

            .node-robo-header {
                background: #252528 !important;
                border-bottom: 1px solid #333 !important;
            }

            .node-robo-input {
                background: #121316 !important;
                border: 1px solid #333 !important;
                color: white !important;
            }

            .node-robo-btn-add {
                background: rgba(255,255,255,0.05) !important;
                border: 1px dashed #555 !important;
                color: #888 !important;
            }
        }

        .drawflow .drawflow-node.selected {
            box-shadow: 0 0 0 3px #736AF0, 0 10px 25px rgba(0,0,0,0.3);
        }

        .node-robo-header {
            background: #f8f9fa;
            padding: 10px 15px;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #eee;
        }

        .node-robo-body {
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .node-robo-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.2s;
            font-family: inherit;
        }

            .node-robo-input:focus {
                border-color: #736AF0;
            }

        .node-robo-btn-add {
            background: #f0f4f8;
            border: 1px dashed #ccc;
            color: #555;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

            .node-robo-btn-add:hover {
                background: #e2e8f0;
                color: #333;
            }

        .node-del-icon {
            cursor: pointer;
            color: #ff4444;
            font-size: 16px;
            opacity: 0.5;
            transition: 0.2s;
        }

            .node-del-icon:hover {
                opacity: 1;
            }

        /* Красивые соединения */
        .drawflow .connection .main-path {
            stroke: #736AF0;
            stroke-width: 3px;
        }

        .drawflow .inputs .input {
            left: -14px;
            background: #fff;
            border: 2px solid #10b981;
            width: 16px;
            height: 16px;
        }

        .drawflow .outputs .output {
            right: -14px;
            background: #fff;
            border: 2px solid #736AF0;
            width: 16px;
            height: 16px;
        }
    
    </style>
</head>
<body>

    <div id="loader"><div style="color:#8e8e93;">Подключение...</div></div>

    <div id="viewList" class="view">
        <div class="premium-header">
            <div style="width: 40px;"></div>
            <div class="header-title">Платформа Ботов</div>
            <button class="header-icon-btn" onclick="switchView('viewLink')" title="Привязать">➕</button>
        </div>
        <div class="content-area">
            <div id="botsContainer"><div style="text-align: center; color: #888; padding: 20px;">Загрузка...</div></div>
            <button class="btn-primary" style="background: #252528; margin-top:20px;" onclick="window.location.href='index.html'">В мессенджер</button>
        </div>
    </div>

    <div id="viewEditor" class="view" style="flex:1;">
        <div class="premium-header">
            <button class="header-icon-btn" onclick="switchView('viewList')">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
            </button>
            <div class="header-title" id="editorBotName">Сценарий</div>
            <button class="header-icon-btn" onclick="saveGraphToFirebase()" id="saveBtn">
                <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12" /></svg>
            </button>
        </div>

        <div style="position: relative; flex: 1; overflow: hidden;">
            <div style="position: absolute; top: 15px; left: 15px; color:#888; font-size:12px; z-index: 5; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 8px; backdrop-filter: blur(5px);">
                ПКМ (Правый клик) - открыть меню. Space + ЛКМ - перемещение. Del - удалить.
            </div>

            <div id="drawflow"></div>

            <div id="nodeContextMenu">
                <div class="context-menu-item" onclick="addNodeFromMenu('message')"><span class="icon icon-msg">Тт</span> Сообщение</div>
                <div class="context-menu-item" onclick="alert('В разработке')"><span class="icon icon-action">⚡</span> Действие</div>
                <div class="context-menu-item" onclick="alert('В разработке')"><span class="icon icon-cond">⚗️</span> Условие</div>
                <div class="context-menu-item" onclick="alert('В разработке')"><span class="icon icon-timer">🕒</span> Таймер</div>
                <div class="context-menu-item" onclick="addNodeFromMenu('trigger')"><span class="icon icon-key">✏️</span> Ключевые слова</div>
                <div class="context-menu-divider"></div>
                <div class="context-menu-cancel" onclick="closeContextMenu()">Отмена</div>
            </div>
        </div>
    </div>

    <div id="viewLink" class="view">
        <div class="premium-header">
            <button class="header-icon-btn" onclick="switchView('viewList')">🔙</button>
            <div class="header-title">Добавление бота</div>
            <div style="width:40px;"></div>
        </div>
        <div class="content-area" style="text-align: center; padding-top: 50px;">
            <h2>Вставьте API Токен</h2>
            <input type="text" id="linkTokenInput" placeholder="nvg_..." style="width:100%; padding:15px; background:#1c1c1e; border:1px solid #333; color:white; border-radius:12px; margin-bottom:20px; outline:none;">
            <button class="btn-primary" onclick="executeLinkBot()">Подключить бота</button>
        </div>
    </div>

    <script>
        // === FIREBASE ИНИЦИАЛИЗАЦИЯ ===
        const firebaseConfig = {
            apiKey: "AIzaSyBncXLA4D1JdsqQtA8_8rPqQioq2XRfic4",
            authDomain: "mycoolmessenger.firebaseapp.com",
            databaseURL: "https://mycoolmessenger-default-rtdb.firebaseio.com",
            projectId: "mycoolmessenger",
            storageBucket: "mycoolmessenger.firebasestorage.app",
            messagingSenderId: "225503087166",
            appId: "1:225503087166:web:1355f138e34e3a0172df6f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let currentBotToken = null;
        let editor = null; // Экземпляр Drawflow

        // === 1. АВТОРИЗАЦИЯ ===
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loader').style.display = 'none';
                switchView('viewList');
                loadMyBotsList();
                initDrawflow(); // Инициализируем канвас
            } else {
                window.location.href = "index.html";
            }
        });

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // === 2. СПИСОК БОТОВ ===
        async function loadMyBotsList() {
            const container = document.getElementById('botsContainer');
            try {
                const snap = await db.collection('users').where('ownerId', '==', currentUser.uid).where('isBot', '==', true).get();
                if (snap.empty) {
                    container.innerHTML = `<div style="text-align:center; padding:30px; color:#888;">У вас нет ботов. Нажмите ➕ в шапке.</div>`;
                    return;
                }
                let html = '';
                snap.forEach(doc => {
                    const b = doc.data();
                    html += `
                        <div class="bot-item" onclick="openEditor('${b.botToken}', '${b.name}')" style="background:#1c1c1e; margin-bottom:10px; border-radius:12px;">
                            <div class="bot-avatar">🤖</div>
                            <div class="bot-info">
                                <div class="bot-name">${b.name}</div>
                                <div class="bot-nick">@${b.username}</div>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
            } catch(e) { console.error(e); }
        }

        async function executeLinkBot() {
            const token = document.getElementById('linkTokenInput').value.trim();
            if (!token) return;
            try {
                const snap = await db.collection('users').where('botToken', '==', token).get();
                if (snap.empty) return alert("Бот не найден");
                await db.collection('users').doc(snap.docs[0].id).update({ ownerId: currentUser.uid });
                switchView('viewList');
                loadMyBotsList();
            } catch (e) { alert(e.message); }
        }

        // === 3. ИНИЦИАЛИЗАЦИЯ ВИЗУАЛЬНОГО РЕДАКТОРА ===
        let lastMouseX = 0;
        let lastMouseY = 0;

        function initDrawflow() {
            const id = document.getElementById("drawflow");
            editor = new Drawflow(id);

            editor.reroute = true;
            editor.start();

            // Обработка правого клика по холсту
            id.addEventListener('contextmenu', function (e) {
                e.preventDefault(); // Блокируем стандартное меню браузера

                // Получаем точные координаты внутри холста с учетом зума
                const rect = id.getBoundingClientRect();
                lastMouseX = (e.clientX - rect.left - editor.canvas_x) / editor.zoom;
                lastMouseY = (e.clientY - rect.top - editor.canvas_y) / editor.zoom;

                // Показываем наше меню под мышкой
                const menu = document.getElementById('nodeContextMenu');
                menu.style.display = 'flex';
                menu.style.left = e.clientX + 'px';
                menu.style.top = e.clientY + 'px';
            });

            // Закрытие меню при клике в любое другое место
            document.addEventListener('click', closeContextMenu);
        }

        function closeContextMenu() {
            document.getElementById('nodeContextMenu').style.display = 'none';
        }

        // Вызывается из контекстного меню
        function addNodeFromMenu(type) {
            closeContextMenu();

            if (type === 'message') {
                addMessageNode(null, lastMouseX, lastMouseY);
            } else if (type === 'trigger') {
                addTriggerNode(null, lastMouseX, lastMouseY);
            }
        }

        // === 4. СОЗДАНИЕ БЛОКОВ В СТИЛЕ ROBOCHAT ===

        // БЛОК "СООБЩЕНИЕ" (То, что отправляет бот)
        function addMessageNode(data = null, posX = 100, posY = 200) {
            const nodeData = data || { text: "", image: "" };

            const html = `
                <div class="node-robo-header">
                    <span>Сообщение #${ruleBlockCounter}</span>
                    <span class="node-del-icon" onclick="editor.removeNodeId('node-'+this.closest('.drawflow-node').id.slice(5))">✖</span>
                </div>
                <div class="node-robo-body">
                    <textarea df-text class="node-robo-input" rows="3" placeholder="Добавьте текст...">${nodeData.text}</textarea>
                    <input type="text" df-image class="node-robo-input" placeholder="URL картинки (опционально)" value="${nodeData.image}">
                    <div class="node-robo-btn-add">+ Добавить кнопку</div>
                </div>
            `;

            // 1 вход (для подключения триггера), 1 выход (для следующего шага)
            editor.addNode('message', 1, 1, posX, posY, 'message-node', nodeData, html);
            ruleBlockCounter++;
        }

        // БЛОК "КЛЮЧЕВЫЕ СЛОВА" (То, на что реагирует бот)
        function addTriggerNode(data = null, posX = 50, posY = 200) {
            const nodeData = data || { trigger: "" };

            const html = `
                <div class="node-robo-header" style="border-top: 3px solid #10b981;">
                    <span style="color:#10b981;">Условие (Триггер)</span>
                    <span class="node-del-icon" onclick="editor.removeNodeId('node-'+this.closest('.drawflow-node').id.slice(5))">✖</span>
                </div>
                <div class="node-robo-body">
                    <div style="font-size:11px; color:#888; margin-bottom:-5px;">ЕСЛИ НАПИСАЛИ:</div>
                    <input type="text" df-trigger class="node-robo-input" placeholder="напр: привет" value="${nodeData.trigger}">
                </div>
            `;

            // 0 входов (это начало цепочки), 1 выход (ведет к сообщению)
            editor.addNode('trigger', 0, 1, posX, posY, 'trigger-node', nodeData, html);
        }

        // === 5. ОТКРЫТИЕ РЕДАКТОРА ===
        async function openEditor(token, name) {
            currentBotToken = token;
            document.getElementById('editorBotName').innerText = name;
            switchView('viewEditor');

            editor.clear();
            ruleBlockCounter = 1;

            try {
                const doc = await db.collection('bot_flows').doc(token).get();
                if (doc.exists && doc.data().flowData) {
                    editor.import(doc.data().flowData);
                } else {
                    // Если пусто - кидаем стартовые блоки для примера
                    addTriggerNode({ trigger: "старт" }, 100, 200);
                    addMessageNode({ text: "Добро пожаловать в бота!" }, 450, 200);
                }
            } catch (e) {
                console.error("Ошибка загрузки", e);
            }
        }

        // === 5. ОТКРЫТИЕ РЕДАКТОРА ДЛЯ ВЫБРАННОГО БОТА ===
        async function openEditor(token, name) {
            currentBotToken = token;
            document.getElementById('editorBotName').innerText = name;
            switchView('viewEditor');
            
            editor.clear(); // Очищаем холст

            try {
                // Пытаемся загрузить сохраненный граф из Firebase
                const doc = await db.collection('bot_flows').doc(token).get();
                if (doc.exists && doc.data().flowData) {
                    // Загружаем всю магию связей и блоков обратно!
                    editor.import(doc.data().flowData);
                } else {
                    // Если бот пустой, создаем стартовый блок по центру
                    addMessageNode({trigger: "привет", text: "Привет! Я бот."}, 300, 200);
                }
            } catch(e) {
                console.error("Ошибка загрузки сценария", e);
            }
        }

        // === 6. СОХРАНЕНИЕ ГРАФА В БАЗУ ===
        async function saveGraphToFirebase() {
            const btn = document.getElementById('saveBtn');
            btn.style.opacity = '0.5';

            // Эта магия собирает все блоки, их координаты, тексты и линии связей в один JSON объект
            const exportedData = editor.export(); 
            
            try {
                // Сохраняем это в отдельную коллекцию (чтобы не ломать старый формат, если он где-то используется)
                await db.collection('bot_flows').doc(currentBotToken).set({
                    flowData: exportedData,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert("Сценарий успешно сохранен на сервере!");
            } catch (e) {
                alert("Ошибка сохранения: " + e.message);
            } finally {
                btn.style.opacity = '1';
            }
        }

    </script>
</body>
</html>
