<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novogram - Robochat Style Builder</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>

    <style>
        /* ==========================================
           ROBOCHAT STYLE LAYOUT (DARK THEME)
           ========================================== */
        :root {
            --bg-dark: #121316;
            --bg-panel: #1c1c1e;
            --bg-canvas: #0a0c10;
            --border: rgba(255,255,255,0.05);
            --primary: #736AF0;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --tg-blue: #2AABEE;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg-dark); color: var(--text-main); height: 100dvh; overflow: hidden; display: flex; }

        /* --- ВЬЮХИ --- */
        .view { display: none; width: 100%; height: 100%; }
        .view.active { display: flex; }

        /* --- БОКОВОЕ МЕНЮ (ЛЕВОЕ) --- */
        .sidebar {
            width: 70px; background: var(--bg-panel); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px; z-index: 100;
        }
        .sidebar-btn {
            width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: var(--text-muted); cursor: pointer; transition: 0.2s; margin-bottom: 10px;
        }
        .sidebar-btn:hover { background: rgba(255,255,255,0.05); color: var(--text-main); }
        .sidebar-btn.active { background: rgba(115, 106, 240, 0.15); color: var(--primary); }

        /* --- РАБОЧАЯ ОБЛАСТЬ --- */
        .main-area { flex: 1; display: flex; flex-direction: column; position: relative; }

        /* --- ВЕРХНЯЯ ПАНЕЛЬ --- */
        .topbar {
            height: 65px; background: var(--bg-panel); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 10;
        }
        
        .bot-selector { display: flex; align-items: center; gap: 12px; cursor: pointer; }
        .bot-avatar { width: 36px; height: 36px; border-radius: 10px; background: var(--primary); display: flex; align-items: center; justify-content: center; font-size: 18px; }
        .bot-info-texts { display: flex; flex-direction: column; }
        .bot-name { font-weight: 600; font-size: 15px; }
        .bot-status { font-size: 12px; color: var(--text-muted); }

        .topbar-actions { display: flex; align-items: center; gap: 15px; }
        .btn { padding: 10px 20px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: 0.2s; border: none; display: flex; align-items: center; gap: 8px;}
        .btn:active { transform: scale(0.95); }
        
        .btn-test { background: transparent; border: 1px solid var(--tg-blue); color: var(--tg-blue); }
        .btn-test:hover { background: rgba(42, 171, 238, 0.1); }
        
        .btn-publish { background: var(--primary); color: white; }
        .btn-publish:hover { filter: brightness(1.1); }

        /* --- ХОЛСТ (CANVAS) --- */
        #drawflow {
            flex: 1; position: relative; background: var(--bg-canvas);
            background-image: radial-gradient(rgba(255,255,255,0.1) 1px, transparent 0); background-size: 20px 20px;
        }

        /* --- ПЛАВАЮЩИЕ КНОПКИ СПРАВА ВНИЗУ --- */
        .floating-controls {
            position: absolute; right: 25px; bottom: 25px; display: flex; align-items: flex-end; gap: 15px; z-index: 50;
        }
        .zoom-panel {
            background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px;
            display: flex; align-items: center; padding: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }
        .zoom-btn { background: transparent; border: none; color: var(--text-muted); width: 34px; height: 34px; border-radius: 8px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center;}
        .zoom-btn:hover { background: rgba(255,255,255,0.05); color: white; }
        .zoom-value { font-size: 13px; font-weight: 600; color: white; padding: 0 10px; }

        .add-step-btn {
            width: 50px; height: 50px; border-radius: 16px; background: var(--primary); color: white;
            border: none; font-size: 28px; cursor: pointer; box-shadow: 0 10px 25px rgba(115, 106, 240, 0.4);
            display: flex; align-items: center; justify-content: center; transition: 0.2s;
        }
        .add-step-btn:hover { transform: translateY(-3px); }
        .add-step-btn:active { transform: scale(0.9); }

        /* --- КОНТЕКСТНОЕ МЕНЮ (КАК В ПРОШЛОМ ШАГЕ) --- */
        #nodeContextMenu {
            position: absolute; background: #252528; border: 1px solid #333; border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6); z-index: 10000; width: 220px; display: none; flex-direction: column; padding: 6px 0; user-select: none;
        }
        .context-menu-item { padding: 10px 16px; color: #ccc; font-size: 14px; cursor: pointer; display: flex; align-items: center; gap: 12px; transition: 0.1s; }
        .context-menu-item:hover { background: rgba(255,255,255,0.05); color: #fff; }

        /* --- ДИЗАЙН БЛОКОВ DRAWFLOW --- */
        .drawflow .drawflow-node { background: var(--bg-panel); border: 1px solid #333; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 280px; color: #fff; padding: 0; overflow: hidden; }
        .drawflow .drawflow-node.selected { box-shadow: 0 0 0 3px var(--primary), 0 10px 25px rgba(0,0,0,0.5); border-color: var(--primary); }
        .node-robo-header { background: #252528; padding: 12px 15px; font-size: 13px; font-weight: 600; color: #aaa; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; }
        .node-robo-body { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .node-robo-input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #444; background: #121316; color: white; font-size: 14px; outline: none; font-family: inherit; }
        .node-robo-input:focus { border-color: var(--primary); }
        
        .drawflow .connection .main-path { stroke: var(--primary); stroke-width: 3px; }
        .drawflow .inputs .input { left: -14px; background: #1c1c1e; border: 2px solid #10b981; width: 16px; height: 16px; }
        .drawflow .outputs .output { right: -14px; background: #1c1c1e; border: 2px solid var(--primary); width: 16px; height: 16px; }

        /* Загрузчик и списки */
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:var(--bg-dark); display:flex; align-items:center; justify-content:center; z-index:9999; color: white;}
        .card-list { padding: 40px; max-width: 800px; margin: 0 auto; width: 100%; }
        .bot-item { background: var(--bg-panel); border: 1px solid var(--border); padding: 20px; border-radius: 16px; margin-bottom: 15px; display: flex; align-items: center; cursor: pointer; transition: 0.2s;}
        .bot-item:hover { border-color: var(--primary); }
    </style>
</head>
<body>

    <div id="loader">Подключение к аккаунту...</div>

    <div id="viewList" class="view" style="flex-direction: column; overflow-y: auto;">
        <div class="topbar">
            <div class="bot-name">Ваши боты</div>
            <button class="btn btn-publish" onclick="switchView('viewLink')">Подключить токен</button>
        </div>
        <div class="card-list" id="botsContainer">
            </div>
    </div>

    <div id="viewEditor" class="view">
        
        <aside class="sidebar">
            <div class="sidebar-btn" onclick="switchView('viewList')" title="Назад к списку">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </div>
            <div class="sidebar-btn active" title="Сценарии">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            </div>
            <div class="sidebar-btn" title="Рассылки (В разработке)" onclick="alert('В разработке')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
            </div>
            <div class="sidebar-btn" title="Настройки" onclick="window.location.href='index.html'">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9c.26.6.8.98 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </div>
        </aside>

        <main class="main-area">
            
            <header class="topbar">
                <div class="bot-selector">
                    <div class="bot-avatar">🤖</div>
                    <div class="bot-info-texts">
                        <div class="bot-name" id="editorBotName">Имя бота</div>
                        <div class="bot-status" id="editorBotNick">@username</div>
                    </div>
                </div>
                
                <div class="topbar-actions">
                    <button class="btn btn-test" onclick="alert('Чтобы проверить бота, зайдите в мессенджер и напишите ему кодовое слово!')">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        Проверить
                    </button>
                    <button class="btn btn-publish" onclick="saveGraphToFirebase()" id="saveBtn">
                        Опубликовать
                    </button>
                </div>
            </header>

            <div id="drawflow"></div>

            <div id="nodeContextMenu">
                <div class="context-menu-item" onclick="addNodeFromMenu('message')">💬 Сообщение</div>
                <div class="context-menu-item" onclick="addNodeFromMenu('trigger')">⚡ Условие (Триггер)</div>
                <div class="context-menu-item" onclick="closeContextMenu()" style="color:#888; border-top: 1px solid #333; margin-top:5px;">Отмена</div>
            </div>

            <div class="floating-controls">
                <div class="zoom-panel">
                    <button class="zoom-btn" onclick="editor.zoom_out()">-</button>
                    <span class="zoom-value">Zoom</span>
                    <button class="zoom-btn" onclick="editor.zoom_in()">+</button>
                </div>
                <button class="add-step-btn" onclick="showContextMenuAtCenter()">+</button>
            </div>

        </main>
    </div>

    <div id="viewLink" class="view" style="flex-direction: column; align-items: center; justify-content: center;">
        <h2>Подключение API Токена</h2>
        <input type="text" id="linkTokenInput" placeholder="nvg_..." style="width: 300px; padding: 15px; border-radius: 10px; border: 1px solid #333; background: #1c1c1e; color: white; margin-bottom: 20px;">
        <div style="display:flex; gap:10px;">
            <button class="btn btn-test" onclick="switchView('viewList')">Отмена</button>
            <button class="btn btn-publish" onclick="executeLinkBot()">Подключить</button>
        </div>
    </div>

    <script>
        // === ВСТАВЬ СВОИ ДАННЫЕ FIREBASE СЮДА ===
        const firebaseConfig = {
            apiKey: "AIzaSyBncXLA4D1JdsqQtA8_8rPqQioq2XRfic4",
            authDomain: "mycoolmessenger.firebaseapp.com",
            databaseURL: "https://mycoolmessenger-default-rtdb.firebaseio.com",
            projectId: "mycoolmessenger",
            storageBucket: "mycoolmessenger.firebasestorage.app",
            messagingSenderId: "225503087166",
            appId: "1:225503087166:web:1355f138e34e3a0172df6f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let currentBotToken = null;
        let editor = null;
        let ruleBlockCounter = 1;

        // 1. АВТОРИЗАЦИЯ
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loader').style.display = 'none';
                switchView('viewList');
                loadMyBotsList();
                initDrawflow(); 
            } else {
                window.location.href = "index.html";
            }
        });

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // 2. СПИСОК БОТОВ
        async function loadMyBotsList() {
            const container = document.getElementById('botsContainer');
            try {
                const snap = await db.collection('users').where('ownerId', '==', currentUser.uid).where('isBot', '==', true).get();
                if (snap.empty) {
                    container.innerHTML = `<div style="text-align:center; color:#888;">У вас нет подключенных ботов.</div>`;
                    return;
                }
                let html = '';
                snap.forEach(doc => {
                    const b = doc.data();
                    html += `
                        <div class="bot-item" onclick="openEditor('${b.botToken}', '${b.name}', '${b.username}')">
                            <div class="bot-avatar" style="width: 50px; height: 50px; border-radius: 12px; background: #736AF0; display:flex; align-items:center; justify-content:center; font-size:24px; margin-right: 15px;">🤖</div>
                            <div>
                                <div style="font-size:18px; font-weight:bold;">${b.name}</div>
                                <div style="color:#888;">@${b.username}</div>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
            } catch(e) { console.error(e); }
        }

        async function executeLinkBot() {
            const token = document.getElementById('linkTokenInput').value.trim();
            if (!token) return;
            try {
                const snap = await db.collection('users').where('botToken', '==', token).get();
                if (snap.empty) return alert("Бот не найден");
                await db.collection('users').doc(snap.docs[0].id).update({ ownerId: currentUser.uid });
                switchView('viewList');
                loadMyBotsList();
            } catch (e) { alert(e.message); }
        }

        // 3. ИНИЦИАЛИЗАЦИЯ DRAWFLOW (ХОЛСТ)
        let lastMouseX = 0;
        let lastMouseY = 0;

        function initDrawflow() {
            const id = document.getElementById("drawflow");
            editor = new Drawflow(id);
            editor.reroute = true; 
            editor.start();

            // Контекстное меню по правому клику
            id.addEventListener('contextmenu', function(e) {
                e.preventDefault();
                const rect = id.getBoundingClientRect();
                lastMouseX = (e.clientX - rect.left - editor.canvas_x) / editor.zoom;
                lastMouseY = (e.clientY - rect.top - editor.canvas_y) / editor.zoom;

                const menu = document.getElementById('nodeContextMenu');
                menu.style.display = 'flex';
                menu.style.left = e.clientX + 'px';
                menu.style.top = e.clientY + 'px';
            });

            document.addEventListener('click', closeContextMenu);
        }

        function closeContextMenu() {
            document.getElementById('nodeContextMenu').style.display = 'none';
        }

        // Открытие меню по кнопке "+" по центру экрана
        function showContextMenuAtCenter() {
            const id = document.getElementById("drawflow");
            const rect = id.getBoundingClientRect();
            
            // Визуальный центр холста
            lastMouseX = (rect.width / 2 - editor.canvas_x) / editor.zoom;
            lastMouseY = (rect.height / 2 - editor.canvas_y) / editor.zoom;

            const menu = document.getElementById('nodeContextMenu');
            menu.style.display = 'flex';
            menu.style.left = (rect.width / 2) + 'px';
            menu.style.top = (rect.height / 2) + 'px';
        }

        function addNodeFromMenu(type) {
            if (type === 'message') addMessageNode(null, lastMouseX, lastMouseY);
            else if (type === 'trigger') addTriggerNode(null, lastMouseX, lastMouseY);
        }

        // 4. СОЗДАНИЕ УЗЛОВ (В СТИЛЕ ROBOCHAT)
        function addMessageNode(data = null, posX = 100, posY = 200) {
            const nodeData = data || { text: "", image: "" };
            const html = `
                <div class="node-robo-header">
                    <span>💬 Сообщение</span>
                    <span style="color:#ff4444; cursor:pointer;" onclick="editor.removeNodeId('node-'+this.closest('.drawflow-node').id.slice(5))">✖</span>
                </div>
                <div class="node-robo-body">
                    <textarea df-text class="node-robo-input" rows="3" placeholder="Текст ответа...">${nodeData.text}</textarea>
                    <input type="text" df-image class="node-robo-input" placeholder="Ссылка на картинку (URL)" value="${nodeData.image}">
                </div>
            `;
            editor.addNode('message', 1, 1, posX, posY, 'message-node', nodeData, html);
        }

        function addTriggerNode(data = null, posX = 50, posY = 200) {
            const nodeData = data || { trigger: "" };
            const html = `
                <div class="node-robo-header" style="border-top: 3px solid #10b981;">
                    <span style="color:#10b981;">⚡ Триггер (Условие)</span>
                    <span style="color:#ff4444; cursor:pointer;" onclick="editor.removeNodeId('node-'+this.closest('.drawflow-node').id.slice(5))">✖</span>
                </div>
                <div class="node-robo-body">
                    <div style="font-size:11px; color:#aaa; margin-bottom:-5px;">Если клиент написал:</div>
                    <input type="text" df-trigger class="node-robo-input" placeholder="например: привет" value="${nodeData.trigger}">
                </div>
            `;
            editor.addNode('trigger', 0, 1, posX, posY, 'trigger-node', nodeData, html);
        }

        // 5. ОТКРЫТИЕ РЕДАКТОРА
        async function openEditor(token, name, username) {
            currentBotToken = token;
            document.getElementById('editorBotName').innerText = name;
            document.getElementById('editorBotNick').innerText = '@' + username;
            switchView('viewEditor');
            
            editor.clear();

            try {
                const doc = await db.collection('bot_flows').doc(token).get();
                if (doc.exists && doc.data().flowData) {
                    editor.import(doc.data().flowData);
                } else {
                    addTriggerNode({trigger: "привет"}, 100, 300);
                    addMessageNode({text: "Добро пожаловать!"}, 500, 300);
                }
            } catch(e) {
                console.error(e);
            }
        }

        // 6. СОХРАНЕНИЕ
        async function saveGraphToFirebase() {
            const btn = document.getElementById('saveBtn');
            btn.innerText = "Сохранение...";
            
            const exportedData = editor.export(); 
            
            try {
                await db.collection('bot_flows').doc(currentBotToken).set({
                    flowData: exportedData,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                btn.style.background = "#10b981";
                btn.innerText = "Сохранено ✓";
                setTimeout(() => {
                    btn.style.background = "var(--primary)";
                    btn.innerText = "Опубликовать";
                }, 2000);
            } catch (e) {
                alert("Ошибка: " + e.message);
                btn.innerText = "Опубликовать";
            }
        }
    </script>
</body>
</html>
