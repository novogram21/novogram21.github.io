<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Novogram - Visual Bot Builder</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.css">
    <script src="https://cdn.jsdelivr.net/gh/jerosoler/Drawflow/dist/drawflow.min.js"></script>

    <style>
        /* ПРЕМИУМ ДИЗАЙН NOVOGRAM */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #121316; color: #fff; margin: 0;
            display: flex; flex-direction: column; height: 100dvh; overflow: hidden;
        }

        /* Шапка */
        .premium-header {
            display: flex; justify-content: space-between; align-items: center;
            padding: calc(env(safe-area-inset-top) + 20px) 20px 15px;
            background: rgba(18, 19, 22, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05); z-index: 100;
        }
        .header-title { font-weight: 600; font-size: 18px; color: white; }
        .header-icon-btn {
            background: none; border: none; padding: 8px; border-radius: 50%;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            color: #736AF0; transition: 0.2s;
        }

        /* Вьюхи */
        .view { display: none; height: 100%; flex-direction: column; }
        .view.active { display: flex; }
        
        .content-area { flex: 1; overflow-y: auto; padding: 20px; max-width: 800px; margin: 0 auto; width: 100%; }

        .btn-primary {
            background: #736AF0; color: white; border: none; padding: 15px;
            border-radius: 14px; font-weight: 600; font-size: 16px; width: 100%; cursor: pointer; transition: 0.2s;
        }

        /* ==========================================
           СТИЛИ ВИЗУАЛЬНОГО РЕДАКТОРА (DRAWFLOW)
           ========================================== */
        #drawflow {
            position: relative; width: 100%; height: 100%; background: #0a0c10;
            background-image: radial-gradient(#222 1px, transparent 0); background-size: 20px 20px;
        }

        .editor-top-bar {
            position: absolute; top: 15px; left: 15px; right: 15px;
            display: flex; justify-content: space-between; z-index: 5;
        }

        .toolbar-btn {
            background: #1c1c1e; color: white; border: 1px solid #333; padding: 10px 15px;
            border-radius: 10px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Переопределение стилей самой библиотеки под твой дизайн */
        .drawflow .drawflow-node {
            background: #1c1c1e; border: 1px solid #333; border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 300px; padding: 0;
            color: white; font-family: inherit;
        }
        .drawflow .drawflow-node.selected { border-color: #736AF0; box-shadow: 0 0 0 2px rgba(115,106,240,0.3); }

        .node-header {
            background: #252528; padding: 12px 15px; border-top-left-radius: 16px;
            border-top-right-radius: 16px; font-weight: bold; font-size: 14px;
            border-bottom: 1px solid #333; display: flex; justify-content: space-between;
        }
        .node-content { padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        
        .node-input {
            background: #121316; border: 1px solid #333; color: white;
            padding: 10px; border-radius: 8px; width: 100%; font-family: inherit; resize: vertical; outline: none;
        }
        .node-input:focus { border-color: #736AF0; }

        /* Точки соединения */
        .drawflow .inputs .input { left: -10px; background: #fff; border: 2px solid #736AF0; width: 16px; height: 16px; }
        .drawflow .outputs .output { right: -10px; background: #fff; border: 2px solid #10b981; width: 16px; height: 16px; }
        
        /* Линии */
        .drawflow .connection .main-path { stroke: #736AF0; stroke-width: 3px; }

        /* Кнопки внутри блока */
        .node-buttons-container { display: flex; flex-direction: column; gap: 5px; margin-top: 10px; }
        .node-btn-item {
            background: rgba(255,255,255,0.05); padding: 8px; border-radius: 8px;
            display: flex; align-items: center; border: 1px solid #333; position: relative;
        }
        .node-btn-input { background: transparent; border: none; color: #4a9eff; width: 100%; outline: none; font-weight: bold; text-align: center; }
        
        /* Загрузчик */
        #loader { position: fixed; top:0; left:0; width:100%; height:100%; background:#121316; display:flex; align-items:center; justify-content:center; z-index:9999; }
    </style>
</head>
<body>

    <div id="loader"><div style="color:#8e8e93;">Подключение...</div></div>

    <div id="viewList" class="view">
        <div class="premium-header">
            <div style="width: 40px;"></div>
            <div class="header-title">Платформа Ботов</div>
            <button class="header-icon-btn" onclick="switchView('viewLink')" title="Привязать">➕</button>
        </div>
        <div class="content-area">
            <div id="botsContainer"><div style="text-align: center; color: #888; padding: 20px;">Загрузка...</div></div>
            <button class="btn-primary" style="background: #252528; margin-top:20px;" onclick="window.location.href='index.html'">В мессенджер</button>
        </div>
    </div>

    <div id="viewEditor" class="view" style="flex:1;">
        <div class="premium-header">
            <button class="header-icon-btn" onclick="switchView('viewList')">🔙</button>
            <div class="header-title" id="editorBotName">Сценарий</div>
            <button class="header-icon-btn" onclick="saveGraphToFirebase()" id="saveBtn">💾</button>
        </div>
        
        <div style="position: relative; flex: 1;">
            <div class="editor-top-bar">
                <button class="toolbar-btn" onclick="addMessageNode()">+ Добавить Сообщение</button>
                <div style="color:#888; font-size:12px; align-self:center;">Удерживайте 'Space' для перемещения холста. Del - удалить выделенное.</div>
            </div>
            
            <div id="drawflow"></div>
        </div>
    </div>

    <div id="viewLink" class="view">
        <div class="premium-header">
            <button class="header-icon-btn" onclick="switchView('viewList')">🔙</button>
            <div class="header-title">Добавление бота</div>
            <div style="width:40px;"></div>
        </div>
        <div class="content-area" style="text-align: center; padding-top: 50px;">
            <h2>Вставьте API Токен</h2>
            <input type="text" id="linkTokenInput" placeholder="nvg_..." style="width:100%; padding:15px; background:#1c1c1e; border:1px solid #333; color:white; border-radius:12px; margin-bottom:20px; outline:none;">
            <button class="btn-primary" onclick="executeLinkBot()">Подключить бота</button>
        </div>
    </div>

    <script>
        // === FIREBASE ИНИЦИАЛИЗАЦИЯ ===
        const firebaseConfig = {
            apiKey: "AIzaSyBncXLA4D1JdsqQtA8_8rPqQioq2XRfic4",
            authDomain: "mycoolmessenger.firebaseapp.com",
            databaseURL: "https://mycoolmessenger-default-rtdb.firebaseio.com",
            projectId: "mycoolmessenger",
            storageBucket: "mycoolmessenger.firebasestorage.app",
            messagingSenderId: "225503087166",
            appId: "1:225503087166:web:1355f138e34e3a0172df6f"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let currentBotToken = null;
        let editor = null; // Экземпляр Drawflow

        // === 1. АВТОРИЗАЦИЯ ===
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                document.getElementById('loader').style.display = 'none';
                switchView('viewList');
                loadMyBotsList();
                initDrawflow(); // Инициализируем канвас
            } else {
                window.location.href = "index.html";
            }
        });

        function switchView(viewId) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
        }

        // === 2. СПИСОК БОТОВ ===
        async function loadMyBotsList() {
            const container = document.getElementById('botsContainer');
            try {
                const snap = await db.collection('users').where('ownerId', '==', currentUser.uid).where('isBot', '==', true).get();
                if (snap.empty) {
                    container.innerHTML = `<div style="text-align:center; padding:30px; color:#888;">У вас нет ботов. Нажмите ➕ в шапке.</div>`;
                    return;
                }
                let html = '';
                snap.forEach(doc => {
                    const b = doc.data();
                    html += `
                        <div class="bot-item" onclick="openEditor('${b.botToken}', '${b.name}')" style="background:#1c1c1e; margin-bottom:10px; border-radius:12px;">
                            <div class="bot-avatar">🤖</div>
                            <div class="bot-info">
                                <div class="bot-name">${b.name}</div>
                                <div class="bot-nick">@${b.username}</div>
                            </div>
                        </div>`;
                });
                container.innerHTML = html;
            } catch(e) { console.error(e); }
        }

        async function executeLinkBot() {
            const token = document.getElementById('linkTokenInput').value.trim();
            if (!token) return;
            try {
                const snap = await db.collection('users').where('botToken', '==', token).get();
                if (snap.empty) return alert("Бот не найден");
                await db.collection('users').doc(snap.docs[0].id).update({ ownerId: currentUser.uid });
                switchView('viewList');
                loadMyBotsList();
            } catch (e) { alert(e.message); }
        }

        // === 3. ИНИЦИАЛИЗАЦИЯ ВИЗУАЛЬНОГО РЕДАКТОРА ===
        function initDrawflow() {
            const id = document.getElementById("drawflow");
            editor = new Drawflow(id);
            
            // Настройки движка
            editor.reroute = true; // Кривые линии
            editor.start();

            // Если удалили ноду/связь (кнопка Del)
            editor.on('nodeRemoved', function(id) { console.log("Удален блок " + id); });
        }

        // === 4. СОЗДАНИЕ БЛОКА СООБЩЕНИЯ В РЕДАКТОРЕ ===
        function addMessageNode(data = null, posX = 100, posY = 200) {
            // Если данные не переданы (создаем новый пустой блок)
            const nodeData = data || {
                trigger: "",
                text: "Новое сообщение",
                image: "",
                btn1: "", btn2: ""
            };

            const html = `
                <div class="node-header">💬 Блок ответа</div>
                <div class="node-content">
                    <div>
                        <div style="font-size:11px; color:#888; margin-bottom:5px;">ТРИГГЕР (ЕСЛИ НАПИШУТ):</div>
                        <input type="text" df-trigger class="node-input" placeholder="Слово, напр: старт">
                    </div>
                    <div>
                        <div style="font-size:11px; color:#888; margin-bottom:5px;">ТЕКСТ ОТВЕТА:</div>
                        <textarea df-text class="node-input" rows="3" placeholder="Текст..."></textarea>
                    </div>
                    <div>
                        <div style="font-size:11px; color:#888; margin-bottom:5px;">КАРТИНКА (URL):</div>
                        <input type="text" df-image class="node-input" placeholder="https://...">
                    </div>
                    <div class="node-buttons-container">
                        <div style="font-size:11px; color:#888;">КНОПКИ (Следующие шаги):</div>
                        <div class="node-btn-item">
                            <input type="text" df-btn1 class="node-btn-input" placeholder="+ Кнопка 1">
                        </div>
                        <div class="node-btn-item">
                            <input type="text" df-btn2 class="node-btn-input" placeholder="+ Кнопка 2">
                        </div>
                    </div>
                </div>
            `;
            
            // editor.addNode(name, inputs, outputs, posX, posY, class, data, html);
            // 1 вход (слева) для связи с кнопкой предыдущего блока. 
            // 2 выхода (справа) для двух наших кнопок, чтобы вести к следующим блокам.
            editor.addNode('message', 1, 2, posX, posY, 'message-node', nodeData, html);
        }

        // === 5. ОТКРЫТИЕ РЕДАКТОРА ДЛЯ ВЫБРАННОГО БОТА ===
        async function openEditor(token, name) {
            currentBotToken = token;
            document.getElementById('editorBotName').innerText = name;
            switchView('viewEditor');
            
            editor.clear(); // Очищаем холст

            try {
                // Пытаемся загрузить сохраненный граф из Firebase
                const doc = await db.collection('bot_flows').doc(token).get();
                if (doc.exists && doc.data().flowData) {
                    // Загружаем всю магию связей и блоков обратно!
                    editor.import(doc.data().flowData);
                } else {
                    // Если бот пустой, создаем стартовый блок по центру
                    addMessageNode({trigger: "привет", text: "Привет! Я бот."}, 300, 200);
                }
            } catch(e) {
                console.error("Ошибка загрузки сценария", e);
            }
        }

        // === 6. СОХРАНЕНИЕ ГРАФА В БАЗУ ===
        async function saveGraphToFirebase() {
            const btn = document.getElementById('saveBtn');
            btn.style.opacity = '0.5';

            // Эта магия собирает все блоки, их координаты, тексты и линии связей в один JSON объект
            const exportedData = editor.export(); 
            
            try {
                // Сохраняем это в отдельную коллекцию (чтобы не ломать старый формат, если он где-то используется)
                await db.collection('bot_flows').doc(currentBotToken).set({
                    flowData: exportedData,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                alert("Сценарий успешно сохранен на сервере!");
            } catch (e) {
                alert("Ошибка сохранения: " + e.message);
            } finally {
                btn.style.opacity = '1';
            }
        }

    </script>
</body>
</html>
